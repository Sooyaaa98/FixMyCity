<!-- src/app/auth/reset-password/reset-password.component.html
     Phase 8 (§18) — Reset-password form. -->

<div class="fmc-page d-flex justify-content-center">
  <div class="fmc-card rp-card">
    <h3 class="mb-2">
      <i class="bi bi-shield-lock-fill me-2 text-primary" aria-hidden="true"></i>
      Reset your password
    </h3>

    <div *ngIf="tokenChecking" class="text-muted text-center my-4">
      <i class="bi bi-arrow-clockwise bi-spin" aria-hidden="true"></i> Verifying link…
    </div>

    <div *ngIf="tokenValid === false" class="alert alert-warning">
      <i class="bi bi-x-octagon-fill me-2" aria-hidden="true"></i>
      This reset link is invalid or has expired.
      <a routerLink="/forgot-password" class="alert-link ms-1">Request a new one.</a>
    </div>

    <ng-container *ngIf="tokenValid === true && !done">
      <p class="text-muted small">Choose a new password (minimum 8 characters).</p>
      <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
        <div class="fmc-form-group">
          <label class="fmc-label required" for="newPw">New password</label>
          <input id="newPw" type="password" class="fmc-input"
                 formControlName="newPassword" autocomplete="new-password" />
          <span class="fmc-error-msg"
                *ngIf="form.get('newPassword')?.invalid && form.get('newPassword')?.touched">
            Password must be at least 8 characters.
          </span>
        </div>
        <div class="fmc-form-group">
          <label class="fmc-label required" for="conf">Confirm password</label>
          <input id="conf" type="password" class="fmc-input"
                 formControlName="confirm" autocomplete="new-password" />
          <span class="fmc-error-msg" *ngIf="form.errors?.['mismatch'] && form.get('confirm')?.touched">
            Passwords do not match.
          </span>
        </div>
        <button type="submit" class="btn-primary w-100"
                [disabled]="submitting || form.invalid">
          {{ submitting ? 'Saving…' : 'Set new password' }}
        </button>
      </form>
    </ng-container>

    <div *ngIf="done" class="alert alert-success">
      <i class="bi bi-check-circle-fill me-2" aria-hidden="true"></i>
      Password updated. Redirecting you to login…
    </div>

    <p class="mt-3 mb-0 text-center">
      <a routerLink="/login">Back to login</a>
    </p>
  </div>
</div>
