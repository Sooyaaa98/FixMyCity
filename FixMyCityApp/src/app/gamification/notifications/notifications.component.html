<!-- src/app/gamification/notifications/notifications.component.html -->

<div class="fmc-page">

  <!-- Header -->
  <div class="notif-page-header">
    <div class="notif-page-header__title">
      <h2>
        <i class="bi bi-bell-fill" aria-hidden="true"></i>
        Notifications
      </h2>
      <span class="unread-pill" *ngIf="unreadCount > 0" [attr.aria-label]="unreadCount + ' unread'">
        {{ unreadCount }} unread
      </span>
    </div>
    <div class="notif-page-header__actions">
      <button class="btn-secondary btn--sm" (click)="load()" [disabled]="isLoading">
        <i class="bi bi-arrow-clockwise" [class.bi-spin]="isLoading" aria-hidden="true"></i>
        Refresh
      </button>
      <button
        class="btn-secondary btn--sm"
        (click)="markAllRead()"
        [disabled]="isMarking || unreadCount === 0"
      >
        <i class="bi bi-check-lg" aria-hidden="true"></i>
        Mark All Read
      </button>
    </div>
  </div>

  <!-- Loading -->
  <app-loading-spinner *ngIf="isLoading" message="Loading notifications…"></app-loading-spinner>

  <!-- Empty -->
  <app-empty-state
    *ngIf="!isLoading && notifications.length === 0"
    icon="bi bi-bell-slash"
    title="No notifications"
    subtitle="You're all caught up! Notifications about your complaints will appear here."
  ></app-empty-state>

  <!-- List -->
  <div class="fmc-card notif-list" *ngIf="!isLoading && notifications.length > 0" role="list">
    <div
      *ngFor="let n of notifications; trackBy: trackById"
      class="notif-item"
      [class.notif-item--unread]="!n.isRead"
      [class.notif-item--clickable]="!!n.complaintId"
      role="listitem"
      [attr.tabindex]="n.complaintId ? 0 : -1"
      (click)="onNotificationClick(n)"
      (keyup.enter)="onNotificationClick(n)"
      [attr.aria-label]="n.message + (n.isRead ? '' : ' (unread)')"
    >
      <!-- Unread dot -->
      <div class="notif-item__dot" *ngIf="!n.isRead" aria-hidden="true"></div>
      <div class="notif-item__dot notif-item__dot--read" *ngIf="n.isRead" aria-hidden="true"></div>

      <!-- Content -->
      <div class="notif-item__body">
        <p class="notif-item__message">{{ n.message }}</p>
        <div class="notif-item__meta">
          <span class="notif-item__time">{{ relativeTime(n.createdAt) }}</span>
          <span class="notif-item__complaint" *ngIf="n.complaintId">
            <i class="bi bi-arrow-right" aria-hidden="true"></i>
            Complaint #{{ n.complaintId }}
          </span>
        </div>
      </div>

      <!-- Read badge -->
      <span class="notif-item__read-tag" *ngIf="n.isRead" aria-label="Read">
        <i class="bi bi-check-lg" aria-hidden="true"></i>
      </span>
    </div>
  </div>

</div>
