<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>FixMyCity – Citizen Complaint Management</title>
  <meta name="description" content="FixMyCity is a citizen complaint management platform connecting citizens, departments, and organisations to resolve civic issues faster.">
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#2563eb">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <!-- Phase 8 (§19) PWA: app manifest + iOS standalone hints. -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <!-- Theme bootstrap (Phase 5).
       Sets data-theme on <html> BEFORE Angular paints so users on dark mode
       never see a light-theme flash during the initial app bundle download. -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('fmc_theme');
        var dark = saved === 'dark'
          || (!saved && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.setAttribute('data-theme', 'dark');
      } catch (e) { /* private browsing — fall through */ }
    })();
  </script>

  <!-- ── Google Fonts: Inter (premium typography) ──────────────────────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- ── Leaflet 1.9 (Map component) ─────────────────────────────────── -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    defer
  ></script>

  <!-- ── Razorpay Checkout SDK (Payment) ─────────────────────────────── -->
  <!--
    Phase 7 (2026-05-20) — checkout.js is now loaded LAZILY by
    PaymentService.ensureRazorpaySdk() on the first call to
    contributeViaRazorpay(). Reasons:
      1. The SDK emits a "Unrecognized feature: 'otp-credentials'" console
         warning at parse time on every page that includes it. Lazy loading
         confines that warning to the contribution flow.
      2. The SDK fires telemetry to lumberjack.razorpay.com which ad blockers
         routinely block (ERR_BLOCKED_BY_CLIENT). Not loading it on every
         page reduces the noise.
      3. Faster initial page load for users who never contribute.
    The SDK is still loaded from the official CDN — just on demand.
  -->

  <!-- ── Bootstrap & FontAwesome ─────────────────────────────────────── -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  <!-- FontAwesome 4 retained as a fallback during the Bootstrap Icons migration.
       New code MUST use `bi bi-…` classes per the §2 mapping in fixmycity-frontend-upgrades.md. -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" integrity="sha512-SfTiTlX6kk+qitfevl/7LibUOeJWlt9rbyDn92a1DqWOw9vWG2MFoays0sgObmWazO5BQPiFucnnEAjpAB+/Sw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- Bootstrap Icons — modern, consistent icon set (Phase 6 upgrade) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous" defer></script>
</head>

<body>
  <app-root></app-root>
</body>

</html>
